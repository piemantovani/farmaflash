<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FarmaFlash — Business Plan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#FAFAF8;--surface:#FFFFFF;--surface2:#F4F3F0;--text:#1A1A18;--text2:#6B6B66;--text3:#9C9C96;
--border:#E8E7E3;--border2:#D4D3CF;--accent:#1D6B4F;--accent-bg:#E8F5EE;--accent2:#0F4A36;
--blue:#1A5FA0;--blue-bg:#E6F0FA;--coral:#C04E2B;--coral-bg:#FDF0EC;--purple:#5B3FA0;--purple-bg:#F0ECF9;
--amber:#8B6914;--amber-bg:#FBF5E6;--red:#A32D2D;--red-bg:#FCEBEB;--green:#3B6D11;--green-bg:#EEF6E4;
--radius:10px;--radius-lg:14px;
--font:'DM Sans',system-ui,-apple-system,sans-serif;--font-display:'DM Serif Display',Georgia,serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}

.shell{max-width:860px;margin:0 auto;padding:0 20px}
header{padding:48px 0 32px;border-bottom:1px solid var(--border)}
header h1{font-family:var(--font-display);font-size:clamp(28px,5vw,40px);font-weight:400;letter-spacing:-0.5px;margin-bottom:6px}
header p{color:var(--text2);font-size:15px}
.conf{display:inline-block;font-size:11px;font-weight:500;color:var(--coral);background:var(--coral-bg);padding:3px 10px;border-radius:20px;margin-top:10px}

nav{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 0;margin-bottom:32px}
.nav-scroll{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;padding-bottom:2px}
.nav-scroll::-webkit-scrollbar{display:none}
.nav-btn{flex-shrink:0;font-family:var(--font);font-size:13px;font-weight:500;padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap}
.nav-btn:hover{border-color:var(--border2);color:var(--text)}
.nav-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

.section{display:none;animation:fadeIn .3s ease}
.section.visible{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

h2{font-family:var(--font-display);font-size:clamp(22px,4vw,28px);font-weight:400;margin-bottom:16px;letter-spacing:-0.3px}
h3{font-size:16px;font-weight:700;margin:28px 0 12px;color:var(--text)}
.sub{font-size:14px;color:var(--text2);margin-bottom:20px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:16px}
.card-flat{background:var(--surface2);border:none;border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:16px}

.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.metric-label{font-size:12px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.metric-val{font-size:22px;font-weight:700;color:var(--text)}

.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin-right:4px}
.b-teal{background:var(--accent-bg);color:var(--accent2)}
.b-purple{background:var(--purple-bg);color:var(--purple)}
.b-coral{background:var(--coral-bg);color:var(--coral)}
.b-blue{background:var(--blue-bg);color:var(--blue)}
.b-amber{background:var(--amber-bg);color:var(--amber)}
.b-red{background:var(--red-bg);color:var(--red)}
.b-green{background:var(--green-bg);color:var(--green)}

.tbl-wrap{overflow-x:auto;margin:12px 0 20px;border:1px solid var(--border);border-radius:var(--radius)}
table{width:100%;font-size:13px;border-collapse:collapse}
th{text-align:left;padding:10px 14px;background:var(--surface2);color:var(--text2);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:0.3px;border-bottom:1px solid var(--border)}
td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text)}
tr:last-child td{border-bottom:none}
.r{text-align:right}
.b{font-weight:600}

.item{display:flex;gap:12px;margin-bottom:8px;font-size:14px;line-height:1.6;color:var(--text2)}
.item::before{content:"";flex-shrink:0;width:6px;height:6px;margin-top:10px;border-radius:50%;background:var(--accent)}

.step{display:flex;gap:14px;margin-bottom:12px;font-size:14px;line-height:1.6}
.step-n{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
.step-t{color:var(--text2);padding-top:3px}

.callout{border-left:3px solid;border-radius:0 var(--radius) var(--radius) 0;padding:14px 18px;margin:16px 0;font-size:13px;line-height:1.6}
.callout-r{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.callout-i{border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}
.callout-s{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.callout-a{border-color:var(--amber);background:var(--amber-bg);color:var(--amber)}

.person{display:flex;gap:14px;align-items:flex-start;margin-bottom:14px}
.avatar{flex-shrink:0;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
.person-name{font-weight:600;font-size:14px;color:var(--text)}
.person-role{font-size:13px;color:var(--text2)}

.timeline{border-left:2px solid var(--border);margin:16px 0 16px 14px;padding-left:24px}
.tl-item{position:relative;margin-bottom:20px}
.tl-dot{position:absolute;left:-31px;top:4px;width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);background:var(--surface)}
.tl-dot.active{background:var(--accent);border-color:var(--accent)}
.tl-title{font-weight:600;font-size:15px;color:var(--text);margin-bottom:4px}
.tl-desc{font-size:14px;color:var(--text2);line-height:1.6}

.target-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin:12px 0}
.target-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.target-card h4{font-size:14px;font-weight:600;margin-bottom:4px}
.target-card p{font-size:13px;color:var(--text2);line-height:1.5}

footer{padding:40px 0;margin-top:40px;border-top:1px solid var(--border);text-align:center;color:var(--text3);font-size:13px}
</style>
</head>
<body>

<div class="shell">
<header>
<h1>FarmaFlash</h1>
<p>Piattaforma di intermediazione per la consegna a domicilio di farmaci e parafarmaci</p>
<span class="conf">Documento riservato e confidenziale</span>
</header>

<nav>
<div class="nav-scroll" id="nav"></div>
</nav>

<main id="content"></main>

<footer>
FarmaFlash Business Plan v1.0 &mdash; Aprile 2026 &mdash; Mercato iniziale: Ancona / Falconara Marittima
</footer>
</div>

<script>
const sections = [

{id:"exec",label:"Executive summary",content:`
<h2>Executive summary</h2>
<p class="sub">FarmaFlash &egrave; una piattaforma tecnologica di intermediazione che connette farmacie locali e clienti per la consegna a domicilio di parafarmaci, integratori e farmaci da banco (OTC/SOP). La societ&agrave; non vende direttamente farmaci: fornisce la tecnologia, la logistica e il canale di acquisizione clienti alle farmacie partner.</p>
<p class="sub">Il mercato dell&rsquo;e-commerce farmaceutico in Italia cresce a ritmi sostenuti. Nonostante ci&ograve;, la penetrazione della consegna a domicilio nelle citt&agrave; medio-piccole &egrave; quasi inesistente. FarmaFlash colma questo vuoto partendo da Ancona e Falconara Marittima.</p>

<div class="metrics">
<div class="metric"><div class="metric-label">Mercato iniziale</div><div class="metric-val">Ancona</div></div>
<div class="metric"><div class="metric-label">Capitale iniziale</div><div class="metric-val">30.000 &euro;</div></div>
<div class="metric"><div class="metric-label">Break-even</div><div class="metric-val">Mese 14-16</div></div>
<div class="metric"><div class="metric-label">Target seed</div><div class="metric-val">150-250k &euro;</div></div>
</div>

<h3>Team fondatore</h3>
<div class="card">
<div class="person">
<div class="avatar" style="background:var(--accent)">S1</div>
<div><div class="person-name">Socio 1 &mdash; CEO / PM / Marketing</div><div class="person-role">Strategia, go-to-market, partnership farmacie, UX, coordinamento sviluppo</div></div>
</div>
<div class="person">
<div class="avatar" style="background:var(--purple)">S2</div>
<div><div class="person-name">Socio 2 &mdash; CLO / DPO / Legal</div><div class="person-role">Compliance, GDPR, contratti, rapporti PA, struttura societaria. DPO di enti importanti.</div></div>
</div>
<div class="person">
<div class="avatar" style="background:var(--blue)">AI</div>
<div><div class="person-name">Claude &mdash; Dev &amp; analisi AI-assisted</div><div class="person-role">MVP, documentazione, analisi mercato, marketing, automazione. Risparmio stimato: 3-5k &euro;/mese.</div></div>
</div>
</div>

<h3>Obiettivi a 18 mesi</h3>
<div class="item"><span>Lancio MVP con 5-8 farmacie partner ad Ancona/Falconara</span></div>
<div class="item"><span>500+ ordini/mese entro il mese 6</span></div>
<div class="item"><span>Espansione a Pesaro, Fano, Senigallia entro il mese 12</span></div>
<div class="item"><span>Break-even operativo entro il mese 14-16</span></div>
<div class="item"><span>Round seed da 150-250k &euro; entro il mese 18</span></div>
`},

{id:"legal",label:"Normativa",content:`
<h2>Quadro normativo e compliance</h2>
<div class="callout callout-r">Il settore farmaceutico online italiano &egrave; tra i pi&ugrave; regolamentati d&rsquo;Europa. Sanzioni da 5.000 a 50.000 &euro; per violazioni, fino all&rsquo;oscuramento del sito.</div>

<h3>Normativa vendita online farmaci</h3>
<div class="tbl-wrap"><table>
<tr><th>Regola</th><th>Dettaglio</th></tr>
<tr><td class="b">Farmaci vendibili online</td><td>Solo SOP e OTC (elenco AIFA). Vietata vendita farmaci con ricetta.</td></tr>
<tr><td class="b">Soggetti autorizzati</td><td>Solo farmacie/parafarmacie gi&agrave; autorizzate alla vendita fisica, con autorizzazione regionale per e-commerce</td></tr>
<tr><td class="b">Logo ministeriale</td><td>Obbligatorio su ogni pagina con farmaci, con link all&rsquo;elenco ufficiale Min. Salute</td></tr>
<tr><td class="b">Marketplace vietati</td><td>Sentenza CGUE Lindenapotheke vs Amazon (ott. 2024): piattaforme generaliste escluse</td></tr>
<tr><td class="b">Dati sanitari</td><td>Tutti i dati da vendita farmaci = dati sanitari (art. 9 GDPR)</td></tr>
<tr><td class="b">Riferimenti</td><td>D.lgs. 219/2006 art. 112-quater, D.lgs. 17/2014, Direttiva 2011/62/UE</td></tr>
</table></div>

<h3>Modello FarmaFlash: intermediazione tecnologica</h3>
<p class="sub">FarmaFlash NON vende farmaci. Opera come piattaforma tecnologica:</p>
<div class="step"><div class="step-n">1</div><div class="step-t">Mette in contatto il cliente con la farmacia pi&ugrave; vicina</div></div>
<div class="step"><div class="step-n">2</div><div class="step-t">Fornisce alla farmacia la tecnologia per gestire ordini online</div></div>
<div class="step"><div class="step-n">3</div><div class="step-t">Organizza la logistica di consegna tramite rider propri o partner</div></div>
<div class="step"><div class="step-n">4</div><div class="step-t">Gestisce il pagamento per conto della farmacia (payment facilitator)</div></div>
<div class="callout callout-i">La farmacia rimane il venditore. Mantiene la propria autorizzazione, il logo ministeriale e la responsabilit&agrave; sul prodotto.</div>

<h3>GDPR e dati sanitari (responsabilit&agrave; Socio 2 / DPO)</h3>
<div class="item"><span>DPIA (Data Protection Impact Assessment) obbligatoria prima del lancio</span></div>
<div class="item"><span>Registro dei trattamenti conforme art. 30 GDPR</span></div>
<div class="item"><span>Informativa privacy specifica per dati sanitari (art. 9 GDPR)</span></div>
<div class="item"><span>Cifratura end-to-end dei dati relativi a ordini farmaceutici</span></div>
<div class="item"><span>Zero trasferimento dati sanitari a piattaforme terze (no pixel, no CRM esterni)</span></div>
<div class="item"><span>Nomina formale del DPO nella struttura societaria</span></div>
`},

{id:"societa",label:"Costituzione",content:`
<h2>Iter legale e costituzione societ&agrave;</h2>

<h3>Forma giuridica: SRL Startup Innovativa</h3>
<p class="sub">Requisiti soddisfatti: oggetto sociale innovativo e ad alto valore tecnologico, software registrato SIAE, spese R&amp;S superiori al 15%.</p>

<div class="metrics">
<div class="metric"><div class="metric-label">Costo notaio</div><div class="metric-val">~2.000 &euro;</div></div>
<div class="metric"><div class="metric-label">Imposte</div><div class="metric-val">~200 &euro;</div></div>
<div class="metric"><div class="metric-label">SIAE software</div><div class="metric-val">~130 &euro;</div></div>
<div class="metric"><div class="metric-label">Marchio UIBM</div><div class="metric-val">~200 &euro;</div></div>
</div>

<h3>Vantaggi startup innovativa</h3>
<div class="item"><span>Esenzione bollo, diritti segreteria e diritto annuale CCIAA</span></div>
<div class="item"><span>Detrazioni fiscali per investitori fino al 50% dell&rsquo;importo investito</span></div>
<div class="item"><span>Work-for-equity (strumenti finanziari partecipativi)</span></div>
<div class="item"><span>Accesso agevolato al Fondo di Garanzia PMI</span></div>
<div class="item"><span>Patent Box: super deduzione 110% delle spese R&amp;S per software registrato</span></div>
<div class="item"><span>Non distribuisce utili (reinvestiti in R&amp;S per i primi 5 anni)</span></div>

<h3>Passaggi per la costituzione</h3>
<div class="tbl-wrap"><table>
<tr><th>Fase</th><th>Attivit&agrave;</th><th>Tempo</th><th class="r">Costo</th></tr>
<tr><td>1</td><td>Redazione patti parasociali tra soci</td><td>1 settimana</td><td class="r">Interno (Socio 2)</td></tr>
<tr><td>2</td><td>Atto costitutivo e statuto dal notaio (videoconferenza possibile)</td><td>1-2 settimane</td><td class="r">1.500-2.000 &euro;</td></tr>
<tr><td>3</td><td>Iscrizione Registro Imprese + sezione speciale startup</td><td>3-5 giorni</td><td class="r">~200 &euro;</td></tr>
<tr><td>4</td><td>Apertura P.IVA e codice ATECO</td><td>Contestuale</td><td class="r">Incluso</td></tr>
<tr><td>5</td><td>Apertura conto corrente societario</td><td>1 settimana</td><td class="r">Variabile</td></tr>
<tr><td>6</td><td>Vidimazione libri sociali</td><td>1 settimana</td><td class="r">~100 &euro;</td></tr>
<tr><td>7</td><td>Registrazione software SIAE (quando MVP pronto)</td><td>2-4 settimane</td><td class="r">~130 &euro;</td></tr>
<tr><td>8</td><td>Registrazione marchio UIBM</td><td>2-3 settimane</td><td class="r">~200 &euro;</td></tr>
</table></div>

<h3>Patti parasociali (redazione interna Socio 2)</h3>
<div class="tbl-wrap"><table>
<tr><th>Clausola</th><th>Dettaglio</th></tr>
<tr><td class="b">Ripartizione quote</td><td>50/50 oppure 51/49 con diritto di veto su decisioni strategiche</td></tr>
<tr><td class="b">Vesting</td><td>4 anni con cliff di 12 mesi. Se un socio esce nel primo anno, perde tutto.</td></tr>
<tr><td class="b">Lock-up</td><td>Divieto di cessione quote per 24 mesi dalla costituzione</td></tr>
<tr><td class="b">Drag-along / Tag-along</td><td>Protezione reciproca in caso di vendita della societ&agrave;</td></tr>
<tr><td class="b">Non-compete</td><td>Divieto di attivit&agrave; concorrenti per 24 mesi post-uscita</td></tr>
<tr><td class="b">Dead-lock</td><td>Meccanismo di risoluzione stallo: mediazione, poi call/put option</td></tr>
<tr><td class="b">Anti-diluizione</td><td>Protezione per i fondatori in caso di futuri round di investimento</td></tr>
</table></div>

<h3>Propriet&agrave; intellettuale</h3>
<div class="card">
<div class="item"><span><strong>Registrazione software SIAE</strong> (~130 &euro;): data certa e prova di paternit&agrave;. Requisito per status startup innovativa e Patent Box.</span></div>
<div class="item"><span><strong>Marchio UIBM</strong> (~200 &euro;): registrare il nome in Classe 35 (intermediazione commerciale) e Classe 44 (servizi farmaceutici).</span></div>
<div class="item"><span><strong>Patent Box</strong>: la registrazione SIAE sblocca la super deduzione del 110% delle spese R&amp;S degli ultimi 8 anni.</span></div>
</div>
`},

{id:"business",label:"Business model",content:`
<h2>Modello di business</h2>

<h3>Revenue streams</h3>
<div class="tbl-wrap"><table>
<tr><th>Stream</th><th>Meccanismo</th><th class="r">Importo</th></tr>
<tr><td class="b">Commissione per ordine</td><td>% sul valore dell&rsquo;ordine, addebitata alla farmacia</td><td class="r">8-12% (media 10%)</td></tr>
<tr><td class="b">Delivery fee</td><td>Costo di consegna addebitato al cliente</td><td class="r">2,50-4,50 &euro;</td></tr>
<tr><td class="b">Abbonamento farmacia</td><td>Fee mensile per accesso piattaforma (da Fase 2)</td><td class="r">49-99 &euro;/mese</td></tr>
</table></div>
<div class="callout callout-s">Primi 3 mesi: zero commissioni per le farmacie partner. Solo delivery fee al cliente. Questo accelera l&rsquo;onboarding.</div>

<h3>Valore per le farmacie partner</h3>
<div class="item"><span>Nuovo canale di vendita senza investimento tecnologico</span></div>
<div class="item"><span>Accesso a clienti che non avrebbero raggiunto fisicamente</span></div>
<div class="item"><span>Dashboard per gestione ordini, inventario e analytics</span></div>
<div class="item"><span>Nessun costo fisso iniziale (commissione solo sulle vendite effettive)</span></div>
<div class="item"><span>Compliance garantita (logo ministeriale, GDPR, dati sanitari)</span></div>

<h3>Valore per i clienti</h3>
<div class="item"><span>Consegna a domicilio in 60-90 minuti (target iniziale)</span></div>
<div class="item"><span>Catalogo completo di parafarmaci, integratori e OTC</span></div>
<div class="item"><span>Consulenza farmacista via chat (Fase 2)</span></div>
<div class="item"><span>Prezzi identici alla farmacia fisica (obbligo di legge per i farmaci)</span></div>
<div class="item"><span>Tracking ordine in tempo reale</span></div>

<h3>Target clienti prioritari</h3>
<div class="target-grid">
<div class="target-card"><h4>Over 65</h4><p>Mobilit&agrave; ridotta, acquisti ricorrenti, alta fidelizzazione</p></div>
<div class="target-card"><h4>Genitori con bambini</h4><p>Urgenze (febbre notturna, pannolini), poco tempo libero</p></div>
<div class="target-card"><h4>Lavoratori</h4><p>Non riescono a passare in farmacia negli orari di apertura</p></div>
<div class="target-card"><h4>Pazienti cronici</h4><p>Acquisti ricorrenti prevedibili (integratori, prodotti specifici)</p></div>
</div>
`},

{id:"team",label:"Team",content:`
<h2>Team e figure necessarie</h2>

<h3>Fase 0 &mdash; Team fondatore</h3>
<div class="tbl-wrap"><table>
<tr><th>Ruolo</th><th>Chi</th><th>Responsabilit&agrave;</th><th class="r">Compenso</th></tr>
<tr><td class="b">CEO / PM / Marketing</td><td>Socio 1</td><td>Strategia, go-to-market, partnership, UX, coordinamento</td><td class="r">Equity (no stipendio)</td></tr>

</table></div>

<h3>Fase 1 &mdash; mesi 1-6: da aggiungere</h3>
<div class="tbl-wrap"><table>

<tr><td class="b">Commercialista</td><td>Esterno, specializzato startup</td><td class="r">200-300 &euro;/mese</td></tr>
</table></div>

<h3>Fase 2 &mdash; mesi 7-14: da aggiungere</h3>
<div class="tbl-wrap"><table>
<tr><th>Ruolo</th><th>Tipo</th><th class="r">Budget</th></tr>
<tr><td class="b">CTO</td><td>Equity + stipendio ridotto (se non gi&agrave; entrato come socio)</td><td class="r">Da negoziare</td></tr>
<tr><td class="b">Customer success</td><td>Junior full-time, gestione rapporti farmacie</td><td class="r">1.200-1.500 &euro;/mese</td></tr>

{id:"finance",label:"Finanza",content:`

const nav = document.getElementById("nav");
const content = document.getElementById("content");
let active = "exec";

sections.forEach(s => {
  const btn = document.createElement("button");
  btn.className = "nav-btn" + (s.id === active ? " active" : "");
  btn.textContent = s.label;
  btn.setAttribute("data-id", s.id);
  btn.onclick = () => {
    active = s.id;
    document.querySelectorAll(".nav-btn").forEach(b => {
      b.className = "nav-btn" + (b.getAttribute("data-id") === active ? " active" : "");
    });
    render();
    window.scrollTo({ top: nav.offsetTop - 10, behavior: "smooth" });
  };
  nav.appendChild(btn);
});

function render() {
  const s = sections.find(x => x.id === active);
  content.innerHTML = '<div class="section visible">' + s.content + '</div>';
}
render();
</script>
